# Ruff configuration for dat-kit — R1 slice of the External Verification
# Receipt Gate plan (v2). Scope is deliberately narrow per plan §3:
# "start with correctness/security-relevant stable rules and changed-file
# enforcement", not a full style pass. Line-length/formatting rules (E501,
# and the full "I"/"D" families) are intentionally excluded so this gate
# reports real defects, not house-style noise, on a repo that was never
# written to a fixed line-length.

target-version = "py312"
line-length = 100  # advisory only; E501 is not selected below

[lint]
# F  = pyflakes (undefined names, unused imports, unused vars — correctness)
# E9 = pycodestyle error class (actual syntax/runtime-shape errors, not style)
# S  = flake8-bandit (security-relevant patterns: subprocess, eval, yaml.load, etc.)
# B  = flake8-bugbear (likely-bug patterns: mutable defaults, broad except, etc.)
select = ["F", "E9", "S", "B"]

# Nothing ignored repo-wide yet. Any suppression discovered during the
# report-only baseline pass must be recorded here with an owner and reason
# (plan v2 §4 non-goal: "no scanner suppression lacks owner, reason, expiry").
ignore = []

[lint.per-file-ignores]
# Test files use assert by design (S101) and construct fixture payloads that
# can look like hardcoded secrets to a pattern matcher (S105/S106).
"scripts/tests/**/*.py" = ["S101", "S105", "S106"]
