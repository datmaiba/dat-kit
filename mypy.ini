# mypy configuration — R1 slice, REPORT-ONLY.
#
# Per plan v2 §3/§4: mypy is report-only in R1; it must never fail the CI job.
# Its output is written to the summary.json finding counts so a future R2/R3
# ratchet (changed-typed-surfaces-only) has a real baseline to compare against.
# Do not flip this to a blocking gate without first recording the baseline
# count of existing errors — an unbudgeted mypy gate on an untyped codebase
# is exactly the kind of untriaged-baseline problem plan v2 §3 warns against.

[mypy]
python_version = 3.12
ignore_missing_imports = True
follow_imports = silent
# No --strict, no error-on-missing-annotations yet: this run exists to
# produce a finding count, not to block anyone.
